server:
  # Windows: 빈 SERVER_ADDRESS / 127.0.0.1 조합 시 "Bad address: listen" — 0.0.0.0 고정
  address: 0.0.0.0
  port: ${PORT:8080}

spring:
  profiles:
    # IDE Run / mvn without -Dprofile → application-local.yml (Supabase) 사용
    default: local
  application:
    name: villager-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:https://your-project.supabase.co/auth/v1}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB

villager:
  storage:
    supabase-url: ${SUPABASE_URL:https://cnghnbhgcpyubtfdlqyy.supabase.co}
